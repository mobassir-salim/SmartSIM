global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'smartsim-microservices'
    metrics_path: '/metrics'
    static_configs:
      - targets:
          - 'auth-service:8001'
          - 'sim-service:8002'
          - 'plan-service:8003'
          - 'wallet-service:8004'
          - 'order-service:8005'
          - 'notification-service:8006'
          - 'notification-router:8013'
          - 'whatsapp-service:8010'
          - 'sms-service:8011'
          - 'email-service:8012'

# GRAFANA CLOUD REMOTE WRITE CONFIGURATION
