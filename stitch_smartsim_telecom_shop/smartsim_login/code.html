<style>
        body {
            font-family: 'Inter', sans-serif;

            overflow-x: hidden;
        }
        .font-headline { font-family: 'Space Grotesk', sans-serif; }
        
        .neo-brutal-shadow {

        .neo-brutal-shadow-sm {

        }

        .btn-hover-effect:hover {
            transform: translate(-2px, -2px);
            box-shadow: 10px 10px 0px 0px #1a1a1a;
        }
        .btn-hover-effect:active {
            transform: translate(2px, 2px);
            box-shadow: 4px 4px 0px 0px #1a1a1a;
        }

            clip-path: polygon(0% 0%, 100% 0%, 0% 100%);

<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- Header Navigation (Suppressing Shell for Login Focus but keeping Brand) -->
<header class="w-full px-6 py-8 flex justify-center md:justify-start items-center">
<img alt="SmartSIM Logo" class="h-12 w-auto" src="https://lh3.googleusercontent.com/aida/AP1WRLuN0m2mqDfKpZh7daAjdvTr3GWDoMttrV8cTYeJS1fmk3t9YkDlMWvTdZJWfeCaP2KH4IP5SssCE9URPVIy9zvl16iVoBr1wnQoFuPMwTMIkTnMJbK9VIj4hWZVElbt5CyHEDmDJLi0TOJlCfZ8mQpt5EF1mdmBmSXDj4B2aa5Bt49AmyO4MFIM3rFs1pnSe-X21uoVWZdNS5b21ls5gawyMJyZoU38tdRnd4f07V-m_kQ5MHm9VpeaAg"/>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center px-4 py-12 relative overflow-hidden">
<!-- Background Decorative Elements -->
<div class="absolute top-20 right-[10%] w-32 h-32 border-4 border-primary opacity-20 hidden lg:block"></div>
<div class="absolute bottom-40 left-[5%] w-64 h-8 bg-primary-container hidden lg:block -rotate-12"></div>
<!-- Login Container -->
<div class="w-full max-w-md relative">
<!-- Bauhaus Geometric Background Shapes -->
<div class="bauhaus-shape-1"></div>
<div class="bauhaus-shape-2"></div>
<section class="bg-surface border-4 border-primary p-8 md:p-12 neo-brutal-shadow relative z-10">
<header class="mb-10">
<h1 class="font-headline font-black text-5xl md:text-6xl leading-none uppercase tracking-tighter mb-4">
                        WELCOME<br/>BACK
                    </h1>
<p class="font-body text-lg font-medium opacity-80">Access your digital global connectivity portal.</p>
</header>
<form action="#" class="space-y-8" method="POST">
<!-- Email Field -->
<div class="space-y-2">
<label class="block font-headline font-bold uppercase tracking-widest text-sm" for="email">Email Address</label>
<div class="relative">
<input class="w-full bg-transparent border-b-4 border-primary px-0 py-3 font-body text-lg focus:outline-none focus:border-tertiary transition-colors placeholder:text-outline-variant" id="email" name="email" placeholder="name@example.com" required="" type="email"/>
<span class="absolute right-0 bottom-3 material-symbols-outlined text-primary">mail</span>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-end">
<label class="block font-headline font-bold uppercase tracking-widest text-sm" for="password">Password</label>
<a class="text-xs font-headline font-bold uppercase text-tertiary hover:underline underline-offset-4" href="#">Forgot Password?</a>
</div>
<div class="relative">
<input class="w-full bg-transparent border-b-4 border-primary px-0 py-3 font-body text-lg focus:outline-none focus:border-tertiary transition-colors placeholder:text-outline-variant" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<span class="absolute right-0 bottom-3 material-symbols-outlined text-primary">lock</span>
</div>
</div>
<!-- Submit Button -->
<div class="pt-4">
<button class="w-full bg-primary-container text-on-primary-container border-4 border-primary py-5 px-6 font-headline font-black text-2xl uppercase tracking-wider neo-brutal-shadow-sm btn-hover-effect transition-all flex items-center justify-center gap-3" type="submit">
                            LOGIN
                            <span class="material-symbols-outlined font-bold">arrow_forward</span>
</button>
</div>
</form>
<!-- Footer Links -->
<footer class="mt-12 pt-8 border-t-2 border-primary border-dashed">
<p class="font-headline font-bold text-center uppercase tracking-tight">
                        New to SmartSIM? 
                        <a class="text-tertiary hover:bg-tertiary-container px-1 transition-colors" href="#">Register for an account</a>
</p>
</footer>
</section>
</div>
</main>
<!-- Simple Bauhaus Footer -->
<footer class="w-full bg-primary text-background p-6 flex flex-col md:flex-row justify-between items-center gap-4">
<div class="font-headline font-black text-xl uppercase tracking-tighter">
            SmartSIM
        </div>
<div class="font-label font-bold uppercase tracking-widest text-xs opacity-80">
            © 2024 SMARTSIM. FORM FOLLOWS FUNCTION.
        </div>
<div class="flex gap-6">
<a class="font-label font-bold uppercase text-xs hover:text-primary-container transition-colors" href="#">Privacy</a>
<a class="font-label font-bold uppercase text-xs hover:text-primary-container transition-colors" href="#">Terms</a>
</div>
</footer>
<script>
        // Simple micro-interaction for the login button
        const loginBtn = document.querySelector('button[type="submit"]');
        if (loginBtn) {
            loginBtn.addEventListener('mousedown', () => {
                loginBtn.style.transform = 'translate(4px, 4px)';
                loginBtn.style.boxShadow = 'none';
            });
            loginBtn.addEventListener('mouseup', () => {
                loginBtn.style.transform = '';
                loginBtn.style.boxShadow = '';
            });
            loginBtn.addEventListener('mouseleave', () => {
                loginBtn.style.transform = '';
                loginBtn.style.boxShadow = '';
            });
        }

        // Focus animation for inputs
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.parentElement.querySelector('label').style.color = '#0055ff';
            });
            input.addEventListener('blur', () => {
                input.parentElement.parentElement.querySelector('label').style.color = '';
            });
        });
    </script>
</body></html>
